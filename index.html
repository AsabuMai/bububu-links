<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ブブブP | Links</title>
  <style>
    :root { --bg:#0b0b0f; --card:#141420; --text:#f4f4f7; --muted:#b6b6c6; --btn:#1f1f2e; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans CJK SC",sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%, #3b2cff33, transparent 60%), var(--bg); color:var(--text);}
    .wrap{max-width:520px;margin:0 auto;padding:32px 18px 48px}
    .card{background:linear-gradient(180deg,#1a1a2a, #11111a); border:1px solid #2a2a3d; border-radius:18px; padding:22px; box-shadow:0 20px 60px #00000066}
    .top{display:flex; gap:14px; align-items:center}
    .avatar{width:72px;height:72px;border-radius:16px; object-fit:cover; border:1px solid #2a2a3d}
    h1{font-size:20px;margin:0} .sub{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.4}
    .links{margin-top:18px; display:flex; flex-direction:column; gap:10px}
    a.btn{display:flex; align-items:center; justify-content:space-between; text-decoration:none; color:var(--text);
      background:var(--btn); border:1px solid #2a2a3d; padding:14px 14px; border-radius:14px; transition:.15s;}
    a.btn:hover{transform:translateY(-1px); border-color:#4a4a70}
    .tag{color:var(--muted); font-size:12px}
    .row{display:flex; gap:10px; margin-top:14px}
    button.copy{flex:1; background:#0f0f18; color:var(--text); border:1px solid #2a2a3d; border-radius:14px; padding:12px; cursor:pointer}
    footer{margin-top:14px; color:var(--muted); font-size:12px; text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <!-- 把 avatar.png 换成你的头像文件名 -->
        <img class="avatar" src="avatar.png" alt="avatar" />
        <div>
          <h1>ブブブP</h1>
          <div class="sub">学園アイドルマスター / 藤田ことね担当<br/>出勤♪ 出勤♪ 大出勤♡</div>
        </div>
      </div>

      <div class="links">
        <a class="btn" href="https://x.com/YouSan233" target="_blank" rel="noreferrer">
          <span>X / @YouSan233</span><span class="tag">Follow</span>
        </a>
        <!-- REDNOTE 主页链接你需要换成你自己的（不同账号格式可能不同） -->
        <a class="btn" href="https://xhslink.com/m/49SmGoZdWrQ" target="_blank" rel="noreferrer">
          <span>REDNOTE / 423711376</span><span class="tag">Open</span>
        </a>
      </div>

      <div class="row">
        <button class="copy" onclick="copyText('QQ：526530439')">QQ</button>
        <button class="copy" onclick="copyText('P-ID：C4DTWCWB')">P-ID</button>
      </div>

      <footer>© ブブブP · 名刺交換歓迎</footer>
    </div>
  </div>

  <script>
    function copyText(t){
      navigator.clipboard.writeText(t).then(()=>alert("Copy： " + t)).catch(()=>prompt("复制失败，请手动复制：", t));
    }
  </script>
</body>

</html>
